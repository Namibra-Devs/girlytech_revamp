<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 182 46" fill="none">
  <!-- Left pins -->
  <line x1="10" y1="17" x2="4"  y2="17" stroke="#ec4899" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="10" y1="23" x2="4"  y2="23" stroke="#ec4899" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="10" y1="29" x2="4"  y2="29" stroke="#ec4899" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Chip body -->
  <rect x="10" y="11" width="26" height="24" rx="6" fill="#ec4899"/>
  <rect x="15" y="16" width="16" height="14" rx="3" fill="#0b1a3a"/>

  <!-- Inner node -->
  <circle cx="23" cy="23" r="3.2" fill="#ec4899"/>
  <!-- Inner traces -->
  <line x1="17.5" y1="20" x2="20.2" y2="20" stroke="#ec4899" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="25.8" y1="20" x2="28.5" y2="20" stroke="#ec4899" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="17.5" y1="26" x2="20.2" y2="26" stroke="#ec4899" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="25.8" y1="26" x2="28.5" y2="26" stroke="#ec4899" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Top pins -->
  <line x1="16" y1="11" x2="16" y2="5"  stroke="#ec4899" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="23" y1="11" x2="23" y2="5"  stroke="#ec4899" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="30" y1="11" x2="30" y2="5"  stroke="#ec4899" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Bottom pins -->
  <line x1="16" y1="35" x2="16" y2="41" stroke="#ec4899" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="23" y1="35" x2="23" y2="41" stroke="#ec4899" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="30" y1="35" x2="30" y2="41" stroke="#ec4899" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Right pins -->
  <line x1="36" y1="17" x2="42" y2="17" stroke="#ec4899" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="36" y1="23" x2="42" y2="23" stroke="#ec4899" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="36" y1="29" x2="42" y2="29" stroke="#ec4899" stroke-width="2.2" stroke-linecap="round"/>

  <!-- "Girly" -->
  <text x="52" y="31"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="22" font-weight="700"
    fill="white" letter-spacing="-0.5">Girly</text>

  <!-- "Tech" in pink -->
  <text x="108" y="31"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="22" font-weight="700"
    fill="#ec4899" letter-spacing="-0.5">Tech</text>
</svg>
